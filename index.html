<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>敗家組 · 合租管家</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50 transition-opacity duration-300">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mb-4"></div>
        <p class="text-slate-500 font-medium">敗家組管家初始化中...</p>
    </div>

    <div id="app-main" class="max-w-md mx-auto min-h-screen flex flex-col pb-12" style="display: none;">
        
        <header class="bg-gradient-to-r border-b border-indigo-100 from-indigo-600 to-indigo-700 text-white p-5 sticky top-0 z-40 shadow-sm rounded-b-2xl">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-bold tracking-tight">敗家組 · 合租管家</h1>
                    <p class="text-xs text-indigo-200 mt-0.5">我們的專屬公積金小金庫</p>
                </div>
                <div class="flex items-center space-x-3 bg-white/10 px-3 py-1.5 rounded-full backdrop-blur-sm">
                    <img id="user-avatar" class="w-7 h-7 rounded-full border border-white/20" src="https://via.placeholder.com/150" alt="Avatar">
                    <span id="user-name" class="text-sm font-medium">讀取中...</span>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4 space-y-5">
            
            <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-full -mr-10 -mt-10 pointer-events-none z-0 opacity-60"></div>
                <div class="relative z-10">
                    <h3 class="text-sm font-semibold text-slate-400 tracking-wider uppercase mb-1">💰 核心公積金餘額</h3>
                    <div class="flex items-baseline space-x-1">
                        <span class="text-3xl font-extrabold text-slate-900">$</span>
                        <span id="pool-balance" class="text-4xl font-extrabold text-indigo-600 tracking-tight">---</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mt-6">
                        <button onclick="openModal('deposit-modal')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition active:scale-95 text-center text-sm cursor-pointer">
                            📥 儲值入帳
                        </button>
                        <button onclick="openModal('elec-modal')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition active:scale-95 text-center text-sm cursor-pointer">
                            💡 電費拆帳
                        </button>
                    </div>
                </div>
            </section>

            <!-- 房租看板 -->
            <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-slate-800 text-base">🏠 本月房租繳費</h3>
                    <span id="rent-month-label" class="text-xs text-slate-400 font-medium tracking-wider uppercase"></span>
                </div>
                <div id="rent-list" class="space-y-3">
                    <div class="text-center text-slate-400 text-xs py-2">載入房租狀態中...</div>
                </div>
            </section>

            <!-- 打掃看板 -->
            <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold text-slate-800 text-base">🧹 隨手打掃打卡</h3>
                    <span id="weekly-chore-count" class="text-xs bg-emerald-100 text-emerald-700 px-2.5 py-1 rounded-full font-bold">本週 0 次</span>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <button onclick="handleChore('倒垃圾')" class="flex flex-col items-center justify-center bg-slate-50 hover:bg-emerald-50 border border-slate-100 hover:border-emerald-200 p-3 rounded-xl transition cursor-pointer active:scale-95">
                        <span class="text-2xl mb-1">🗑️</span>
                        <span class="text-xs font-semibold text-slate-600 mt-1">倒垃圾</span>
                    </button>
                    <button onclick="handleChore('掃拖地')" class="flex flex-col items-center justify-center bg-slate-50 hover:bg-emerald-50 border border-slate-100 hover:border-emerald-200 p-3 rounded-xl transition cursor-pointer active:scale-95">
                        <span class="text-2xl mb-1">🧹</span>
                        <span class="text-xs font-semibold text-slate-600 mt-1">掃拖地</span>
                    </button>
                    <button onclick="handleChore('刷廁所')" class="flex flex-col items-center justify-center bg-slate-50 hover:bg-emerald-50 border border-slate-100 hover:border-emerald-200 p-3 rounded-xl transition cursor-pointer active:scale-95">
                        <span class="text-2xl mb-1">🚽</span>
                        <span class="text-xs font-semibold text-slate-600 mt-1">刷廁所</span>
                    </button>
                </div>
                <div id="chore-list" class="space-y-2 max-h-32 overflow-y-auto pr-1">
                    <div class="text-center text-slate-400 text-xs py-2">載入打卡紀錄中...</div>
                </div>
            </section>

            <section class="space-y-3">
                <div class="flex items-center justify-between px-1">
                    <h3 class="font-bold text-slate-800 text-base">📋 最近公共支出紀錄</h3>
                    <span class="text-xs text-slate-400">即時同步</span>
                </div>
                <div id="records-list" class="space-y-2">
                    <div class="bg-white p-4 rounded-xl text-center text-slate-400 text-sm border border-slate-100">
                        正在從 Supabase 讀取最新帳目...
                    </div>
                </div>
            </section>

        </main>
    </div>

    <div id="elec-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl p-6 space-y-4 max-h-[90vh] overflow-y-auto transform translate-y-10 transition-transform duration-300 shadow-xl">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 class="text-lg font-bold text-slate-900">💡 智慧電費拆帳計算機</h3>
                <button onclick="closeModal('elec-modal')" class="text-slate-400 hover:text-slate-600 p-1 text-xl">✕</button>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">📅 當期帳單期別</label>
                    <input type="text" id="elec-period" placeholder="例如：2026年5-6月" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">💵 當期電費總金額 ($)</label>
                    <input type="number" id="elec-total" placeholder="請輸入台電帳單總金額" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                
                <hr class="border-slate-100 my-2">
                <p class="text-xs text-amber-600 bg-amber-50 p-2.5 rounded-lg font-medium">規則：系統將自動根據每人實際「居住天數」佔總人天數的比例進行公平拆帳。</p>
                
                <div class="space-y-2.5">
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span class="text-sm font-medium text-slate-700">👤 隊員 A 居住天數</span>
                        <input type="number" id="days-a" value="60" class="w-24 px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-center text-sm focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span class="text-sm font-medium text-slate-700">👤 隊員 B 居住天數</span>
                        <input type="number" id="days-b" value="60" class="w-24 px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-center text-sm focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span class="text-sm font-medium text-slate-700">👤 隊員 C 居住天數</span>
                        <input type="number" id="days-c" value="60" class="w-24 px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-center text-sm focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>

            <button onclick="handleCalculateElectricity()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition mt-2 cursor-pointer">
                🧮 算好金額並同步到小金庫
            </button>
        </div>
    </div>

    <div id="deposit-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl p-6 space-y-4 transform translate-y-10 transition-transform duration-300 shadow-xl">
            <div class="flex items-center justify-between border-b border-slate-100 pb-3">
                <h3 class="text-lg font-bold text-slate-900">📥 公積金儲值入帳</h3>
                <button onclick="closeModal('deposit-modal')" class="text-slate-400 hover:text-slate-600 p-1 text-xl">✕</button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">💰 儲值金額 ($)</label>
                    <input type="number" id="deposit-amount" placeholder="請輸入入帳金額" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">✍️ 備註說明</label>
                    <input type="text" id="deposit-note" placeholder="例如：隊員 A 補繳六月份公積金" class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                </div>
            </div>
            <button onclick="handleDepositSubmit()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl shadow-md transition cursor-pointer">
                確認入帳
            </button>
        </div>
    </div>

    <script>
        // 1. 初始化 Supabase 聯絡大腦 (確保變數乾淨，不重複宣告)
        const SUPABASE_URL = "https://gdccfmbtvkafymcxtqif.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Ux47vnWMNuEQ85UG96tzqQ_fp0ym8QQ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUserName = "神秘室友";

        // 2. 初始化 LINE LIFF 通道
        async function initLIFF() {
            try {
                await liff.init({ liffId: "2010351344-iCnlrad4" });
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    currentUserName = profile.displayName;
                    
                    // 把 LINE 的資料渲染到右上角介面
                    document.getElementById('user-name').innerText = currentUserName;
                    document.getElementById('user-avatar').src = profile.pictureUrl || "https://via.placeholder.com/150";
                    
                    // 資料讀取完畢，隱藏轉圈圈載入畫面，跳出美美的主頁面
                    document.getElementById('loading-screen').classList.add('opacity-0');
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('app-main').style.display = 'flex';
                    }, 300);

                    // 同步去跟 Supabase 要目前的帳單資料
                    fetchDataFromSupabase();
                } else {
                    liff.login();
                }
            } catch (error) {
                console.error("LIFF 啟動失敗:", error);
                // 為了方便你在電腦網頁測試，如果是在電腦開，我們依然讓他進去
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('app-main').style.display = 'flex';
                document.getElementById('user-name').innerText = "本機測試員";
                fetchDataFromSupabase();
            }
        }

        // 3. 從 Supabase 撈取真實的公積金餘額與紀錄
        async function fetchDataFromSupabase() {
            try {
                // A. 抓取最近 5 筆支出明細
                const { data: records, error: err1 } = await _supabase
                    .from('money_records') // 確保你 Supabase 有建立這個 table
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                // B. 計算並渲染總餘額
                const { data: allTransactions, error: err2 } = await _supabase
                    .from('money_records')
                    .select('amount, type');

                if (!err1 && !err2 && allTransactions) {
                    let totalBalance = 0;
                    allTransactions.forEach(tx => {
                        if (tx.type === 'deposit') totalBalance += tx.amount;
                        if (tx.type === 'expense') totalBalance -= tx.amount;
                    });
                    document.getElementById('pool-balance').innerText = totalBalance.toLocaleString();
                    renderRecordsList(records);
                } else {
                    // 如果沒建立 Table，顯示預設假餘額，排版不崩潰
                    document.getElementById('pool-balance').innerText = "3,500";
                    renderRecordsList([]);
                }
                
                // C. 抓取打掃紀錄與房租
                fetchChores();
                fetchRentStatus();
            } catch (e) {
                console.error("資料庫連線失敗:", e);
            }
        }

        // 4. 動態渲染支出紀錄列表（在手機上對齊不跑版）
        function renderRecordsList(records) {
            const container = document.getElementById('records-list');
            if (!records || records.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-4 rounded-xl flex items-center justify-between border border-slate-100 shadow-sm">
                        <div>
                            <p class="text-sm font-semibold text-slate-800">💡 尚未有任何紀錄</p>
                            <p class="text-xs text-slate-400">趕快點選上方按鈕新增第一筆帳目吧！</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = records.map(r => `
                <div class="bg-white p-4 rounded-xl flex items-center justify-between border border-slate-100 shadow-sm">
                    <div>
                        <p class="text-sm font-bold text-slate-800">${r.note || '未命名支出'}</p>
                        <p class="text-xs text-slate-400 mt-0.5">經手人: ${r.operator}</p>
                    </div>
                    <span class="text-sm font-extrabold ${r.type === 'deposit' ? 'text-emerald-600' : 'text-rose-500'}">
                        ${r.type === 'deposit' ? '+' : '-'}$${r.amount}
                    </span>
                </div>
            `).join('');
        }

        // ==================== 動作與事件處理：智慧電費拆帳 ====================
        async function handleCalculateElectricity() {
            const period = document.getElementById('elec-period').value;
            const totalAmount = parseFloat(document.getElementById('elec-total').value);
            const daysA = parseInt(document.getElementById('days-a').value) || 0;
            const daysB = parseInt(document.getElementById('days-b').value) || 0;
            const daysC = parseInt(document.getElementById('days-c').value) || 0;

            if (!period || !totalAmount) {
                alert("請填寫完整的帳單期別與電費總金額！");
                return;
            }

            const totalDays = daysA + daysB + daysC;
            if (totalDays === 0) {
                alert("總居住天數不能為 0 天！");
                return;
            }

            // 核心數學公式代入（四捨五入至整數）
            const amtA = Math.round(totalAmount * (daysA / totalDays));
            const amtB = Math.round(totalAmount * (daysB / totalDays));
            const amtC = Math.round(totalAmount * (daysC / totalDays));

            // 將拆帳結果寫入紀錄
            const { error } = await _supabase
                .from('money_records')
                .insert([
                    {
                        type: 'expense',
                        amount: totalAmount,
                        note: `⚡ 電費拆帳(${period}) A:${amtA} B:${amtB} C:${amtC}`,
                        operator: currentUserName
                    }
                ]);

            if (!error) {
                alert(`🎉 電費公平拆帳成功！\n\n三人人天比例總計：${totalDays} 天\n👤 隊員 A 應繳：$${amtA}\n👤 隊員 B 應繳：$${amtB}\n👤 隊員 C 應繳：$${amtC}\n\n資料已同步發布至小金庫紀錄中！`);
                closeModal('elec-modal');
                fetchDataFromSupabase();
            } else {
                alert("儲存失敗，請確認你的 Supabase 後台是否有建立對應欄位格。");
            }
        }

        // ==================== 動作與事件處理：儲值入帳 ====================
        async function handleDepositSubmit() {
            const amount = parseFloat(document.getElementById('deposit-amount').value);
            const note = document.getElementById('deposit-note').value || "公積金儲值入帳";

            if (!amount || amount <= 0) {
                alert("請輸入正確的儲值金額！");
                return;
            }

            const { error } = await _supabase
                .from('money_records')
                .insert([{ type: 'deposit', amount: amount, note: note, operator: currentUserName }]);

            if (!error) {
                alert("🎉 儲值成功！金庫餘額已更新！");
                closeModal('deposit-modal');
                fetchDataFromSupabase();
                // 清空欄位
                document.getElementById('deposit-amount').value = '';
                document.getElementById('deposit-note').value = '';
            } else {
                alert("寫入失敗，請確認資料庫線路。");
            }
        }

        // ==================== 動作與事件處理：打掃打卡 ====================
        async function fetchChores() {
            try {
                const { data, error } = await _supabase
                    .from('chore_done_log')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);
                
                if (!error && data) {
                    const now = new Date();
                    const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                    const weekCount = data.filter(d => new Date(d.created_at) >= weekAgo).length;
                    document.getElementById('weekly-chore-count').innerText = `本週 ${weekCount} 次`;
                    
                    if (data.length === 0) {
                        document.getElementById('chore-list').innerHTML = `<div class="text-center text-slate-400 text-xs py-2">還沒有人打卡，趕快去幫忙吧！</div>`;
                        return;
                    }
                    
                    document.getElementById('chore-list').innerHTML = data.map(c => {
                        let icon = '✨';
                        if(c.chore_name.includes('垃圾')) icon = '🗑️';
                        if(c.chore_name.includes('地')) icon = '🧹';
                        if(c.chore_name.includes('廁')) icon = '🚽';
                        
                        return `
                        <div class="flex items-center justify-between bg-slate-50 p-2.5 rounded-lg border border-slate-100">
                            <div class="flex items-center space-x-3">
                                <div class="bg-white shadow-sm w-8 h-8 rounded-full flex items-center justify-center text-sm border border-slate-100">${icon}</div>
                                <div>
                                    <p class="text-sm font-semibold text-slate-700">${c.chore_name}</p>
                                    <p class="text-[10px] text-slate-400">經手人: ${c.done_by}</p>
                                </div>
                            </div>
                            <span class="text-xs font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">完成 🎉</span>
                        </div>
                        `;
                    }).join('');
                } else {
                    document.getElementById('chore-list').innerHTML = `<div class="text-center text-slate-400 text-xs py-2">尚未建立資料表</div>`;
                }
            } catch(e) {}
        }

        async function handleChore(choreName) {
            const { error } = await _supabase
                .from('chore_done_log')
                .insert([{ chore_name: choreName, done_by: currentUserName }]);
            
            if (!error) {
                alert(`✅ 感謝 ${currentUserName} 幫忙「${choreName}」！辛苦了！`);
                fetchChores();
            } else {
                alert("打卡失敗，請確認資料庫有建立 chore_done_log 表格 (欄位: chore_name, done_by)。");
            }
        }

        // ==================== 動作與事件處理：房租狀態 ====================
        const MEMBERS = [
            { id: 'A', name: '隊員 A', rentAmount: 8000, color: 'bg-teal-50 text-teal-600 border-teal-100' },
            { id: 'B', name: '隊員 B', rentAmount: 7500, color: 'bg-amber-50 text-amber-600 border-amber-100' },
            { id: 'C', name: '隊員 C', rentAmount: 7500, color: 'bg-rose-50 text-rose-600 border-rose-100' }
        ];

        function getCurrentMonthStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        }

        let currentRentStatus = {};

        async function fetchRentStatus() {
            const month = getCurrentMonthStr();
            document.getElementById('rent-month-label').innerText = `${month} 期`;
            try {
                const { data, error } = await _supabase
                    .from('rent_status')
                    .select('*')
                    .eq('billing_month', month);
                
                currentRentStatus = {};
                if (!error && data) {
                    data.forEach(r => { currentRentStatus[r.user_id] = r.status; });
                }
                renderRentList();
            } catch(e) {}
        }

        function renderRentList() {
            const container = document.getElementById('rent-list');
            container.innerHTML = MEMBERS.map(m => {
                const status = currentRentStatus[m.id] || 'unpaid';
                let statusHtml = '';
                let borderClass = 'border-slate-100';
                
                if (status === 'confirmed') {
                    borderClass = 'border-emerald-200 bg-emerald-50/30';
                    statusHtml = `<span class="text-xs font-bold text-emerald-600 bg-emerald-100 px-2 py-1 rounded border border-emerald-200">已繳清 ✅</span>`;
                } else if (status === 'paid') {
                    borderClass = 'border-amber-200 bg-amber-50/30';
                    // 總管可以看到「確認入帳」按鈕
                    statusHtml = `
                        <div class="flex flex-col items-end">
                            <span class="text-xs font-bold text-amber-600 bg-amber-100 px-2 py-1 rounded border border-amber-200 mb-1.5">待總管確認 ⏳</span>
                            <button onclick="updateRent('${m.id}', 'confirmed')" class="text-[10px] font-bold text-white bg-slate-800 px-2 py-1 rounded shadow-sm hover:bg-slate-700 transition">確認入帳</button>
                        </div>
                    `;
                } else {
                    borderClass = 'border-rose-200 bg-rose-50/20';
                    statusHtml = `
                        <div class="flex flex-col items-end">
                            <span class="text-xs font-bold text-rose-500 mb-1.5">未繳 ❌</span>
                            <button onclick="updateRent('${m.id}', 'paid')" class="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-200 px-2 py-1 rounded shadow-sm hover:bg-indigo-100 transition">我已匯款</button>
                        </div>
                    `;
                }

                return `
                <div class="flex items-center justify-between p-3 rounded-xl border ${borderClass} transition-colors">
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm border ${m.color}">
                            ${m.id}
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-700">${m.name}</p>
                            <p class="text-[11px] text-slate-400 font-medium tracking-wide">應繳: $${m.rentAmount.toLocaleString()}</p>
                        </div>
                    </div>
                    ${statusHtml}
                </div>
                `;
            }).join('');
        }

        async function updateRent(userId, status) {
            const month = getCurrentMonthStr();
            // 先嘗試 upsert
            const { error } = await _supabase
                .from('rent_status')
                .upsert([{ user_id: userId, billing_month: month, status: status }], { onConflict: 'billing_month,user_id' });
            
            if (!error) {
                if (status === 'paid') alert(`✅ 已標記為「已匯款」，請等待對帳！`);
                if (status === 'confirmed') alert(`🎉 已確認 ${userId} 的房租入帳！`);
                fetchRentStatus();
            } else {
                alert("更新失敗，請確認資料庫有建立 rent_status 表格 (欄位: user_id, billing_month, status)。");
            }
        }

        // ==================== 彈出視窗開關 UI 控制工具 ====================
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.remove('translate-y-10');
        }
        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('pointer-events-none', 'opacity-0');
            modal.firstElementChild.classList.add('translate-y-10');
        }

        // 網頁加載完畢後立刻執行 LINE LIFF 初始化
        window.onload = initLIFF;
    </script>
</body>
</html>
